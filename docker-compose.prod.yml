services:
  app:
    container_name: fabrica-sabor_cia
    build:
      context: .
      dockerfile: Dockerfile
    image: fabrica-sabor_cia:latest
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - ${PORT}
    networks:
      - fabrica-netwotk

networks:
  fabrica-netwotk:
    external: true
