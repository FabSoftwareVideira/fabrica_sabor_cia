on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy para Produção na VPS da BRDrive
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4

      - name: 📄 Criar arquivo .env
        run: |
          cat > .env <<EOF
          DRIVE_API_KEY=${{ secrets.DRIVE_API_KEY }}
          DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}
          PORT=${{ secrets.PORT }}
          EOF

      - name: 🧹 Derrubar stack antiga
        run: |
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

      - name: 🚀 Build e subir stack
        run: |
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: ✅ Verificar container
        run: |
          docker ps --filter "name=fabrica-sabor_cia" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: ♻️ Limpeza de imagens não utilizadas
        run: docker image prune -f
